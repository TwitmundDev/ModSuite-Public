# Le plugin peut gérer les codes de couleur hexadécimaux, vous pouvez donc les utiliser dans les messages.
# Par exemple, "#0c64fa" est le code de couleur hexadécimal pour la couleur bleue.
# %player% sera remplacé par le nom du joueur
# %reason% sera remplacé par la raison
# %ban_id% sera remplacé par l'identifiant du ban
# %usage% sera remplacé par l'utilisation de la commande
# %author% sera remplacé par l'auteur de la sanction
# %duration% sera remplacé par la durée de la sanction
# %date% sera remplacé par la date de la sanction
# %alt_player% sera remplacé par le nom du joueur du ou des comptes alternatifs

